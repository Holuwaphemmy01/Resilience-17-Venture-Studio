# OpenAPI reference for the three unauthenticated Creator Card assessment routes.
# It documents the create, public retrieve, and soft-delete response contracts.
openapi: 3.0.3
info:
  title: Creator Card API
  version: 1.0.0
  description: |
    REST API for creating, retrieving, and deleting Creator Cards.

    Authentication: these assessment endpoints are public and do not require API keys,
    bearer tokens, or any authentication headers.
servers:
  - url: __CURRENT_SERVER_URL__
    description: Current environment

tags:
  - name: Creator Cards
    description: Public creator profile cards and rate cards

paths:
  /creator-cards:
    post:
      tags:
        - Creator Cards
      summary: Create a creator card
      description: Creates a Creator Card after field validation and business-rule checks.
      operationId: createCreatorCard
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreatorCardRequest'
            examples:
              fullCreation:
                summary: Full public card creation
                value:
                  title: George Cooks
                  description: Weekly cooking podcast
                  slug: george-cooks
                  creator_reference: crt_8f2k1m9x4p7w3q5z
                  links:
                    - title: YouTube
                      url: https://youtube.com/@georgecooks
                  service_rates:
                    currency: NGN
                    rates:
                      - name: IG Story Post
                        description: One story mention
                        amount: 5000000
                  status: published
              autoSlug:
                summary: Create and auto-generate slug
                value:
                  title: Ada Designs Things
                  creator_reference: crt_a1b2c3d4e5f6g7h8
                  status: published
              privateCard:
                summary: Private card creation
                value:
                  title: VIP Rate Card
                  creator_reference: crt_x9y8z7w6v5u4t3s2
                  status: published
                  access_type: private
                  access_code: A1B2C3
      responses:
        '200':
          description: Creator Card Created Successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCreatorCardSuccessResponse'
              example:
                status: success
                message: Creator Card Created Successfully.
                data:
                  id: 01JG8XYZA2B3C4D5E6F7G8H9J0
                  title: George Cooks
                  description: Weekly cooking podcast
                  slug: george-cooks
                  creator_reference: crt_8f2k1m9x4p7w3q5z
                  links:
                    - title: YouTube
                      url: https://youtube.com/@georgecooks
                  service_rates:
                    currency: NGN
                    rates:
                      - name: IG Story Post
                        description: One story mention
                        amount: 5000000
                  status: published
                  access_type: public
                  access_code: null
                  created: 1767052800000
                  updated: 1767052800000
                  deleted: null
        '400':
          description: Validation or business-rule error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateSlug:
                  summary: Duplicate slug
                  value:
                    status: error
                    message: Slug is already taken
                    code: SL02
                privateAccessCodeRequired:
                  summary: Missing private access code
                  value:
                    status: error
                    message: access_code is required when access_type is private
                    code: AC01
                publicAccessCodeNotAllowed:
                  summary: access_code on public card
                  value:
                    status: error
                    message: access_code can only be set on private cards
                    code: AC05
                frameworkValidation:
                  summary: Field-level validator error
                  value:
                    status: error
                    message: Expected status value to be one of draft, published
                    code: SPCL_VALIDATION

  /creator-cards/{slug}:
    get:
      tags:
        - Creator Cards
      summary: Retrieve a public Creator Card by slug
      description: Retrieves a published Creator Card. Draft and deleted cards are not publicly retrievable.
      operationId: retrieveCreatorCard
      security: []
      parameters:
        - $ref: '#/components/parameters/SlugPathParam'
        - name: access_code
          in: query
          required: false
          description: Required only for private cards.
          schema:
            type: string
            minLength: 6
            maxLength: 6
            example: A1B2C3
      responses:
        '200':
          description: Creator Card Retrieved Successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveCreatorCardSuccessResponse'
              example:
                status: success
                message: Creator Card Retrieved Successfully.
                data:
                  id: 01JG8XYZA2B3C4D5E6F7G8H9J0
                  title: George Cooks
                  description: Weekly cooking podcast
                  slug: george-cooks
                  creator_reference: crt_8f2k1m9x4p7w3q5z
                  links:
                    - title: YouTube
                      url: https://youtube.com/@georgecooks
                  service_rates:
                    currency: NGN
                    rates:
                      - name: IG Story Post
                        description: One story mention
                        amount: 5000000
                  status: published
                  access_type: public
                  created: 1767052800000
                  updated: 1767052800000
                  deleted: null
        '403':
          description: Private card access error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingAccessCode:
                  value:
                    status: error
                    message: This card is private. An access code is required
                    code: AC03
                invalidAccessCode:
                  value:
                    status: error
                    message: Invalid access code
                    code: AC04
        '404':
          description: Card not found, draft, or deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    status: error
                    message: Creator card not found
                    code: NF01
                draft:
                  value:
                    status: error
                    message: Creator card not found
                    code: NF02

    delete:
      tags:
        - Creator Cards
      summary: Delete a Creator Card by slug
      description: Soft-deletes the Creator Card tied to the slug and creator reference.
      operationId: deleteCreatorCard
      security: []
      parameters:
        - $ref: '#/components/parameters/SlugPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCreatorCardRequest'
            example:
              creator_reference: crt_a1b2c3d4e5f6g7h8
      responses:
        '200':
          description: Creator Card Deleted Successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCreatorCardSuccessResponse'
              example:
                status: success
                message: Creator Card Deleted Successfully.
                data:
                  id: 01JG8XYZA2B3C4D5E6F7G8H9J0
                  title: Ada Designs Things
                  description: null
                  slug: ada-designs-things
                  creator_reference: crt_a1b2c3d4e5f6g7h8
                  links: []
                  service_rates: null
                  status: published
                  access_type: public
                  access_code: null
                  created: 1767052800000
                  updated: 1767139200000
                  deleted: 1767139200000
        '400':
          description: Field-level validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                message: Creator card not found
                code: NF01

components:
  securitySchemes: {}
  parameters:
    SlugPathParam:
      name: slug
      in: path
      required: true
      description: Public Creator Card identifier.
      schema:
        type: string
        minLength: 5
        maxLength: 50
        pattern: '^[A-Za-z0-9_-]+$'
      example: george-cooks

  schemas:
    CreateCreatorCardRequest:
      type: object
      required:
        - title
        - creator_reference
        - status
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
          example: George Cooks
        description:
          type: string
          nullable: true
          maxLength: 500
          example: Weekly cooking podcast
        slug:
          type: string
          minLength: 5
          maxLength: 50
          pattern: '^[A-Za-z0-9_-]+$'
          description: Optional. Auto-generated from title when omitted.
          example: george-cooks
        creator_reference:
          type: string
          minLength: 20
          maxLength: 20
          example: crt_8f2k1m9x4p7w3q5z
        links:
          type: array
          items:
            $ref: '#/components/schemas/CreatorLink'
        service_rates:
          $ref: '#/components/schemas/ServiceRates'
        status:
          type: string
          enum:
            - draft
            - published
          example: published
        access_type:
          type: string
          enum:
            - public
            - private
          default: public
          example: public
        access_code:
          type: string
          nullable: true
          minLength: 6
          maxLength: 6
          pattern: '^[A-Za-z0-9]{6}$'
          description: Required for private cards. Must not be provided for public cards.
          example: A1B2C3

    DeleteCreatorCardRequest:
      type: object
      required:
        - creator_reference
      properties:
        creator_reference:
          type: string
          minLength: 20
          maxLength: 20
          example: crt_a1b2c3d4e5f6g7h8

    CreatorCardWithAccessCode:
      allOf:
        - $ref: '#/components/schemas/CreatorCardPublicFields'
        - type: object
          required:
            - access_code
          properties:
            access_code:
              type: string
              nullable: true
              example: A1B2C3

    CreatorCardWithoutAccessCode:
      allOf:
        - $ref: '#/components/schemas/CreatorCardPublicFields'
      description: Retrieval responses intentionally omit access_code.

    CreatorCardPublicFields:
      type: object
      required:
        - id
        - title
        - slug
        - creator_reference
        - links
        - status
        - access_type
        - created
        - updated
        - deleted
      properties:
        id:
          type: string
          description: Public identifier mapped from MongoDB _id.
          example: 01JG8XYZA2B3C4D5E6F7G8H9J0
        title:
          type: string
          example: George Cooks
        description:
          type: string
          nullable: true
          example: Weekly cooking podcast
        slug:
          type: string
          example: george-cooks
        creator_reference:
          type: string
          example: crt_8f2k1m9x4p7w3q5z
        links:
          type: array
          items:
            $ref: '#/components/schemas/CreatorLink'
        service_rates:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ServiceRates'
        status:
          type: string
          enum:
            - draft
            - published
        access_type:
          type: string
          enum:
            - public
            - private
        created:
          type: number
          example: 1767052800000
        updated:
          type: number
          example: 1767052800000
        deleted:
          type: number
          nullable: true
          example: null

    CreatorLink:
      type: object
      required:
        - title
        - url
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          example: YouTube
        url:
          type: string
          maxLength: 200
          pattern: '^https?://'
          example: https://youtube.com/@georgecooks

    ServiceRates:
      type: object
      required:
        - currency
        - rates
      properties:
        currency:
          type: string
          enum:
            - NGN
            - USD
            - GBP
            - GHS
          example: NGN
        rates:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ServiceRate'

    ServiceRate:
      type: object
      required:
        - name
        - description
        - amount
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: IG Story Post
        description:
          type: string
          maxLength: 250
          example: One story mention
        amount:
          type: integer
          minimum: 1
          example: 5000000

    CreateCreatorCardSuccessResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Creator Card Created Successfully.
        data:
          $ref: '#/components/schemas/CreatorCardWithAccessCode'

    RetrieveCreatorCardSuccessResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Creator Card Retrieved Successfully.
        data:
          $ref: '#/components/schemas/CreatorCardWithoutAccessCode'

    DeleteCreatorCardSuccessResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Creator Card Deleted Successfully.
        data:
          $ref: '#/components/schemas/CreatorCardWithAccessCode'

    ErrorResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Creator card not found
        code:
          type: string
          example: NF01
        errors:
          type: array
          nullable: true
          items:
            type: object
        data:
          nullable: true